<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer glow -->
  <circle cx="200" cy="200" r="150" fill="url(#glow)" opacity="0.3"/>

  <!-- Main globe -->
  <circle cx="200" cy="200" r="120" stroke="#f6821f" stroke-width="3" fill="none"/>

  <!-- Latitude lines -->
  <ellipse cx="200" cy="200" rx="120" ry="40" stroke="#f6821f" stroke-width="2" fill="none" opacity="0.6"/>
  <ellipse cx="200" cy="160" rx="100" ry="25" stroke="#f6821f" stroke-width="1.5" fill="none" opacity="0.4"/>
  <ellipse cx="200" cy="240" rx="100" ry="25" stroke="#f6821f" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Longitude lines -->
  <ellipse cx="200" cy="200" rx="40" ry="120" stroke="#f6821f" stroke-width="2" fill="none" opacity="0.6"/>
  <ellipse cx="200" cy="200" rx="80" ry="120" stroke="#f6821f" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Center point -->
  <circle cx="200" cy="200" r="8" fill="#f6821f"/>

  <!-- Data points -->
  <circle cx="160" cy="170" r="4" fill="#f6821f" opacity="0.8"/>
  <circle cx="240" cy="180" r="4" fill="#f6821f" opacity="0.8"/>
  <circle cx="180" cy="230" r="4" fill="#f6821f" opacity="0.8"/>
  <circle cx="230" cy="150" r="4" fill="#f6821f" opacity="0.8"/>
  <circle cx="150" cy="210" r="4" fill="#f6821f" opacity="0.8"/>
  <circle cx="260" cy="220" r="4" fill="#f6821f" opacity="0.8"/>

  <!-- Connection lines -->
  <line x1="200" y1="200" x2="160" y2="170" stroke="#f6821f" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="200" x2="240" y2="180" stroke="#f6821f" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="200" x2="180" y2="230" stroke="#f6821f" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="200" x2="230" y2="150" stroke="#f6821f" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="200" x2="150" y2="210" stroke="#f6821f" stroke-width="1" opacity="0.3"/>
  <line x1="200" y1="200" x2="260" y2="220" stroke="#f6821f" stroke-width="1" opacity="0.3"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6821f" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f6821f" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
