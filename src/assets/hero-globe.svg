<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Ambient glow -->
  <circle cx="200" cy="200" r="180" fill="url(#ambientGlow)" opacity="0.4"/>

  <!-- Frosted glass circle background -->
  <circle cx="200" cy="200" r="140" fill="url(#glassFill)" opacity="0.3"/>
  <circle cx="200" cy="200" r="140" stroke="url(#glassStroke)" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Main globe ring -->
  <circle cx="200" cy="200" r="120" stroke="#2d6a4f" stroke-width="2.5" fill="none" opacity="0.9"/>

  <!-- Latitude lines -->
  <ellipse cx="200" cy="200" rx="120" ry="40" stroke="#2d6a4f" stroke-width="1.5" fill="none" opacity="0.35"/>
  <ellipse cx="200" cy="160" rx="100" ry="25" stroke="#2d6a4f" stroke-width="1.2" fill="none" opacity="0.25"/>
  <ellipse cx="200" cy="240" rx="100" ry="25" stroke="#2d6a4f" stroke-width="1.2" fill="none" opacity="0.25"/>

  <!-- Longitude lines -->
  <ellipse cx="200" cy="200" rx="40" ry="120" stroke="#2d6a4f" stroke-width="1.5" fill="none" opacity="0.35"/>
  <ellipse cx="200" cy="200" rx="80" ry="120" stroke="#2d6a4f" stroke-width="1.2" fill="none" opacity="0.25"/>

  <!-- Center point with glow -->
  <circle cx="200" cy="200" r="12" fill="url(#centerGlow)" opacity="0.6"/>
  <circle cx="200" cy="200" r="6" fill="#c75c2a"/>

  <!-- Data points -->
  <circle cx="160" cy="170" r="4.5" fill="#c75c2a" opacity="0.85"/>
  <circle cx="240" cy="180" r="4.5" fill="#c75c2a" opacity="0.85"/>
  <circle cx="180" cy="230" r="4.5" fill="#c75c2a" opacity="0.85"/>
  <circle cx="230" cy="150" r="4.5" fill="#2d6a4f" opacity="0.7"/>
  <circle cx="150" cy="210" r="4.5" fill="#2d6a4f" opacity="0.7"/>
  <circle cx="260" cy="220" r="4.5" fill="#2d6a4f" opacity="0.7"/>

  <!-- Connection lines -->
  <line x1="200" y1="200" x2="160" y2="170" stroke="#c75c2a" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="240" y2="180" stroke="#c75c2a" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="180" y2="230" stroke="#c75c2a" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="200" x2="230" y2="150" stroke="#2d6a4f" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="200" x2="150" y2="210" stroke="#2d6a4f" stroke-width="1" opacity="0.15"/>
  <line x1="200" y1="200" x2="260" y2="220" stroke="#2d6a4f" stroke-width="1" opacity="0.15"/>

  <!-- Specular highlight on globe -->
  <ellipse cx="175" cy="165" rx="45" ry="35" fill="white" opacity="0.08" transform="rotate(-20 175 165)"/>

  <defs>
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2d6a4f" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#2d6a4f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#2d6a4f" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glassFill" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#2d6a4f" stop-opacity="0.05"/>
    </radialGradient>
    <linearGradient id="glassStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#2d6a4f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c75c2a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c75c2a" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
